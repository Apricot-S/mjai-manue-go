x-akochan-service: &akochan-service
  image: akochan:latest
  depends_on:
    - server
  environment:
    PORT: ${PORT:-11600}
    NUM_GAMES: ${NUM_GAMES:-1}

x-mjai-environment: &mjai-environment
  HOST: server
  ROOM: ${ROOM:-default}
  PORT: ${PORT:-11600}
  NUM_GAMES: ${NUM_GAMES:-1}

services:
  server:
    build:
      context: ./server
    volumes:
      - ${LOG_DIR:-../log_dir}:/log_dir
    environment:
      <<: *mjai-environment
      GAME_TYPE: ${GAME_TYPE:-tonnan}
    ports:
      - "${PORT:-11600}:${PORT:-11600}"

  manue:
    build:
      context: ./manue
    depends_on:
      - server
    environment:
      <<: *mjai-environment

  akochan1:
    <<: *akochan-service
    build:
      context: ./akochan

  akochan2:
    <<: *akochan-service

  akochan3:
    <<: *akochan-service
